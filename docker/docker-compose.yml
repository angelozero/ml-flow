services:
  mlflow-ui:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_server
    platform: linux/arm64
    ports:
      - "5050:5000"
    volumes:
      - ./mlflow_data:/mlflow_data 
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri sqlite:///mlflow_data/mlflow.db 
      --default-artifact-root file:///mlflow_data/artifacts